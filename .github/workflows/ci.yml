name: IDEP CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-go:
    name: Test Go Services (API Gateway & Temporal Worker)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache-dependency-path: |
          services/api-gateway/go.sum
          services/temporal-worker/go.sum

    - name: Test API Gateway
      working-directory: ./services/api-gateway
      run: |
        go mod download
        go test -v ./...

    - name: Test Temporal Worker
      working-directory: ./services/temporal-worker
      run: |
        go mod download
        go test -v ./...

  test-python:
    name: Test Python Services (Fallback Gateway)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      working-directory: ./services/api-gateway/fallback
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest

    - name: Run Pytest
      working-directory: ./services/api-gateway/fallback
      run: |
        pytest
