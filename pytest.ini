[pytest]
# Pytest configuration for integration tests

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test markers
markers =
    fast: Fast tests (< 30 seconds)
    slow: Slow tests (> 2 minutes)
    concurrent: Tests involving concurrent requests
    retry: Tests involving retry mechanisms
    extraction: Tests for extraction features
    queue: Tests for queue functionality
    error: Tests for error handling

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Timeout settings
timeout = 600
timeout_method = thread

# Coverage settings
[coverage:run]
source = .
omit = 
    */tests/*
    */venv/*
    */.venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
