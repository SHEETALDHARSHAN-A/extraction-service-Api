services:
  # ═══════════════════════════════════════════
  # Go Microservices
  # ═══════════════════════════════════════════

  api-gateway:
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/idep
      - REDIS_URL=redis://redis:6379/0
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - TEMPORAL_TASK_QUEUE=document-processing-task-queue
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=idep-documents
      - JWT_SECRET=idep-dev-secret-change-in-production
      - API_KEYS=dev-key-123:admin,test-key-456:operator
      - API_PORT=8000
      - PADDLEOCR_SERVICE_URL=http://paddleocr-service:8001
      - GLM_OCR_SERVICE_URL=http://glm-ocr-service:8002
      - ENABLE_LAYOUT_DETECTION=true
      - CACHE_LAYOUT_RESULTS=true
      - LAYOUT_CACHE_TTL_SECONDS=3600
      - MAX_PARALLEL_REGIONS=5
      - SERVICE_TIMEOUT_SECONDS=30
      - CIRCUIT_BREAKER_THRESHOLD=5
      - CIRCUIT_BREAKER_TIMEOUT_SECONDS=60
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      temporal:
        condition: service_started
      minio:
        condition: service_started
      paddleocr-service:
        condition: service_healthy
      glm-ocr-service:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    restart: on-failure

  temporal-worker:
    build:
      context: ..
      dockerfile: services/temporal-worker/Dockerfile
    environment:
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - TEMPORAL_TASK_QUEUE=document-processing-task-queue
      - INFERENCE_BACKEND=triton
      - GLM_OCR_SERVICE_URL=http://glm-ocr-service:8002
      - TRITON_HOST=triton
      - TRITON_GRPC_PORT=8001
      - TRITON_HTTP_PORT=8000
      - PREPROCESSING_HOST=preprocessing-service:50051
      - POSTPROCESSING_HOST=postprocessing-service:50052
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=idep-documents
    volumes:
      - idep_tmp:/tmp/idep
    depends_on:
      temporal:
        condition: service_started
      triton:
        condition: service_healthy
      preprocessing-service:
        condition: service_started
      postprocessing-service:
        condition: service_started
      minio:
        condition: service_started
    restart: on-failure

  preprocessing-service:
    build:
      context: ..
      dockerfile: services/preprocessing-service/Dockerfile
    environment:
      - PORT=50051
    ports:
      - "50051:50051"
    volumes:
      - idep_tmp:/tmp/idep
    restart: on-failure

  # ═══════════════════════════════════════════
  # Python Microservices
  # ═══════════════════════════════════════════

  paddleocr-service:
    build:
      context: ..
      dockerfile: services/paddleocr-service/Dockerfile
    ports:
      - "8003:8001"
    environment:
      - PADDLEOCR_MODEL_DIR=/app/models
      - PADDLEOCR_USE_GPU=false
      - SERVICE_HOST=0.0.0.0
      - SERVICE_PORT=8001
      - LOG_LEVEL=INFO
      - MIN_CONFIDENCE_DEFAULT=0.5
      - MAX_IMAGE_SIZE_MB=10
      - REQUEST_TIMEOUT_SECONDS=30
    volumes:
      - paddleocr_models:/app/models
    healthcheck:
      test: [ "CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/health', timeout=5).raise_for_status()" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    restart: on-failure

  glm-ocr-service:
    build:
      context: ..
      dockerfile: services/glm-ocr-service/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - GLM_MODEL_PATH=zai-org/GLM-OCR
      - GLM_PRECISION_MODE=normal
      - CUDA_VISIBLE_DEVICES=0
      - TRANSFORMERS_CACHE=/opt/models
      - HF_HOME=/opt/models
      - SERVICE_HOST=0.0.0.0
      - SERVICE_PORT=8002
      - LOG_LEVEL=INFO
      - MAX_TOKENS_DEFAULT=2048
      - REQUEST_TIMEOUT_SECONDS=60
    volumes:
      - glm_models:/opt/models
    healthcheck:
      test: [ "CMD", "python3", "-c", "import requests; requests.get('http://localhost:8002/health', timeout=5).raise_for_status()" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 16G
        reservations:
          cpus: '2'
          memory: 8G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    restart: on-failure
    shm_size: '2g'

  postprocessing-service:
    build:
      context: ..
      dockerfile: services/post-processing-service/Dockerfile
    environment:
      - PORT=50052
    ports:
      - "50052:50052"
    restart: on-failure

  # Triton with NVIDIA GPU (RTX 2050)
  triton:
    build:
      context: ..
      dockerfile: docker/triton.Dockerfile
    ports:
      - "18000:8000" # HTTP
      - "8001:8001" # gRPC
      - "18002:8002" # Metrics
    environment:
      - IDEP_STRICT_REAL=true
      - GLM_MODEL_PATH=zai-org/GLM-OCR
      - HF_HOME=/opt/hf-cache
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512
    volumes:
      - ../services/triton-models:/models
      - hf_cache:/opt/hf-cache
      - idep_tmp:/tmp/idep
    command:
      - bash
      - -c
      - |
        export LD_LIBRARY_PATH=/usr/local/lib/python3.10/dist-packages/nvidia/cuda_runtime/lib:$$LD_LIBRARY_PATH
        exec tritonserver --model-repository=/models --allow-gpu-metrics=true --log-verbose=0 \
          --backend-config=python,shm-default-byte-size=8388608 \
          --backend-config=python,shm-growth-byte-size=8388608 \
          --backend-config=python,stub-timeout-seconds=600 \
          --backend-config=python,stub-health-check-interval-seconds=30
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v2/health/ready', timeout=3)" ]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 300s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    restart: on-failure
    shm_size: '4g'

  # ═══════════════════════════════════════════
  # Infrastructure
  # ═══════════════════════════════════════════

  temporal:
    image: temporalio/auto-setup:1.22.4
    ports:
      - "7233:7233"
      - "8080:8080"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=db
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "tctl", "--address", "localhost:7233", "cluster", "health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    restart: on-failure

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=idep
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    restart: on-failure

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    restart: on-failure

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    restart: on-failure

  # ═══════════════════════════════════════════
  # Observability
  # ═══════════════════════════════════════════

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=idep-admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true

volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data:
  idep_tmp:
  hf_cache:
  paddleocr_models:
  glm_models:
  redis_data:


networks:
  default:
    name: idep-network
    driver: bridge
