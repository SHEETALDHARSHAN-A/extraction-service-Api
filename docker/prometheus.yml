global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - '/etc/prometheus/prometheus-alerts.yml'

scrape_configs:
  - job_name: 'idep-api-gateway'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api-gateway:8000']
        labels:
          service: 'api-gateway'

  - job_name: 'glm-ocr-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['glm-ocr-service:8002']
        labels:
          service: 'glm-ocr-service'

  - job_name: 'triton-inference'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['triton:8002']
        labels:
          service: 'triton'

  - job_name: 'temporal'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['temporal:8080']
        labels:
          service: 'temporal'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
