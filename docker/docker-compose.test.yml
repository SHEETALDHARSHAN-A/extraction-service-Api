# ─────────────────────────────────────────────────────────────────────────────
# Test overlay  —  docker compose -f docker-compose.yml -f docker-compose.test.yml
#
# Overrides the production compose to run Triton in MOCK mode (no GPU, no model
# download) so the full request/response schema can be validated on any machine.
# ─────────────────────────────────────────────────────────────────────────────
services:
  triton:
    build:
      context: ..
      dockerfile: docker/mock-triton.Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
    command: python /app/docker/mock-triton-server.py
    ports:
      - "18000:8000"
      - "8001:8001"
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v2/health/ready', timeout=2)"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 5s
